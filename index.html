<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordsDay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <button id="themeToggleIcon" class="theme-icon">🌙</button>
        <div id="mainView">
        <h1 class="app-title">Слово дня</h1>
        <p class="counter-day" id="dayCounter">День 1 из 30</p>
        <section class="word-card">
            <div class="word-header">
                <span class="word" id="wordDisplay">Эфемерный</span>
                <button class="info-btn" id="infoBtn">?</button>
            </div>
            <p class="part-of-speech" id="partDisplay">Прилагательное</p>
            <p class="meaning" id="meaningDisplay" >Кратковременный, недолговечный</p>
        </section>
        <textarea class="sentence-input" id="sentenceInput" rows="3" placeholder="Ваше предложение с этим словом"></textarea>
        <button class="submit-btn" id="submitBtn" disabled>Проверить</button>
        <div id="resultArea">

        </div>
        </div>

        <div id="historyView" style="display: none;">
            <h2 class="history-title">История записей</h2>
            <button id="backToMainBtn" class="back-btn">На главную</button>
            <div id="historyList"></div>
            <button id="clearHistoryBtn" class="danger-btn">Очистить историю</button>
        </div>

        <div id="statsView" style="display: none;">
            <h2 class="stats-title">Статистика</h2>
            <button id="backToMainBtn" class="back-btn">На главную</button>
            <div id="statsList"></div>
        </div>

        <div id="settingsView" style="display: none;">
            <h2 class="settings-title">Настройки</h2>
            <button id="backToMainBtn" class="back-btn">На главную</button>
            <div class="settings-group">
                <label class="settings-label">
                    <span>Ежедневные напоминания</span>
                    <input type="checkbox" id="notificationsToggle">
                </label>
            </div>
            <button id="resetProgressBtn" class="danger-btn">Сбросить прогресс</button>
        </div>

        <div class="nav">
            <button class="nav-btn" id="historyBtn">История</button>
            <button class="nav-btn" id="statsBtn">Статистика</button>
            <button class="nav-btn" id="settingsBtn">Настройки</button>
        </div>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
